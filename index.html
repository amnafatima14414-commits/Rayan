<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayan Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-4 font-sans">
    <nav class="border-b border-gray-900 pb-3 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-black text-red-500">RAYAN</h1>
        <div class="space-x-4 text-sm text-gray-400"><a href="#">Home</a><a href="#">Anime</a></div>
    </nav>
    <div class="bg-gradient-to-r from-red-950 to-black rounded-xl p-5 mb-6 border border-red-900/40">
        <span class="text-xs font-bold uppercase tracking-widest text-red-400">Trending</span>
        <h2 class="text-2xl font-black mt-2">Tokyo Revengers</h2>
        <p class="text-xs text-gray-300 mt-1">Takemichi travels back in time to save Hinata and rewrite the fate of Toman.</p>
    </div>
    <h3 class="text-lg font-bold border-l-4 border-red-500 pl-2 mb-4">Trending Anime</h3>
    <div class="grid grid-cols-2 gap-4">
        <!-- Tokyo Revengers (Permanent Wikimedia Link) -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-lg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Tokyo_Revengers_Logo.png" class="w-full aspect-[2/3] object-contain p-4 bg-gray-900">
            <div class="p-2"><h4 class="font-bold text-xs truncate">Tokyo Revengers</h4><p class="text-[10px] text-gray-400">⭐ 8.0</p></div>
        </div>
        <!-- Chainsaw Man (Stable Unsplash Illustration Link) -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-lg">
            <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&auto=format&fit=crop&q=80" class="w-full aspect-[2/3] object-cover">
            <div class="p-2"><h4 class="font-bold text-xs truncate">Chainsaw Man</h4><p class="text-[10px] text-gray-400">⭐ 8.4</p></div>
        </div>
    </div>
</body>
</html>
