<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rayan Anime</title>
<style>
body{margin:0;background:#0b0f19;color:#fff;font-family:Arial}
header{background:#111827;padding:16px;border-bottom:2px solid #e11d48}
h1{margin:0;color:#e11d48}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px}
.card{background:#1a2235;border-radius:10px;overflow:hidden}
.card img{width:100%;height:260px;object-fit:cover;background:#333}
.info{padding:10px}
.hero{padding:40px;background:#222;text-align:center;border-radius:12px;margin-bottom:20px}
</style>
</head>
<body>
<header><h1>RAYAN ANIME</h1></header>
<div class="container">
<div class="hero"><h2>Welcome to Rayan Anime</h2><p>Replace the image files in the images folder.</p></div>
<div class="grid">
<div class="card"><img src="images/tokyo-revengers.jpg"><div class="info"><h3>Tokyo Revengers</h3><p>Action / Sci‑Fi</p></div></div>
<div class="card"><img src="images/chainsaw-man.jpg"><div class="info"><h3>Chainsaw Man</h3><p>Dark Fantasy</p></div></div>
<div class="card"><img src="images/dragon-ball-super.jpg"><div class="info"><h3>Dragon Ball Super</h3><p>Action / Shounen</p></div></div>
<div class="card"><img src="images/death-note.jpg"><div class="info"><h3>Death Note</h3><p>Psychological Thriller</p></div></div>
</div>
</div>
</body>
</html>
