<!DOCTYPE html>
<html>
<head>
    <title>Rayan Anime</title>
    <style>
        body { background-color: #030712; color: white; font-family: sans-serif; padding: 20px; }
        .nav { border-bottom: 1px solid #1f2937; padding-bottom: 15px; display: flex; justify-content: space-between; }
        .red-text { color: #ef4444; font-weight: 900; font-size: 20px; }
        .card-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background-color: #111827; border-radius: 10px; overflow: hidden; border: 1px solid #374151; }
        .placeholder { height: 150px; background-color: #374151; display: flex; align-items: center; justify-content: center; }
        .title { padding: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="red-text">RAYAN</div>
        <div>Home | Anime</div>
    </div>
    <div style="background: #450a0a; padding: 20px; border-radius: 10px; margin-top: 20px;">
        <h2 style="margin: 0; color: #fca5a5;">Tokyo Revengers</h2>
        <p style="font-size: 12px;">Takemichi travels back in time to save Hinata.</p>
    </div>
    <h3 style="margin-top: 30px;">Trending Anime</h3>
    <div class="card-container">
        <div class="card">
            <div class="placeholder">TOKYO REVENGERS</div>
            <div class="title">Tokyo Revengers</div>
        </div>
        <div class="card">
            <div class="placeholder">CHAINSAW MAN</div>
            <div class="title">Chainsaw Man</div>
        </div>
    </div>
</body>
</html>
