<title>Rayan Anime</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0f19;
color:#fff;
}

header{
background:#111827;
padding:20px;
text-align:center;
border-bottom:3px solid #ef4444;
}

header h1{
color:#ef4444;
font-size:32px;
}

.hero{
background:#1f2937;
padding:45px 20px;
text-align:center;
}

.hero h2{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#bbb;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#1f2937;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.info{
padding:15px;
}

.info h3{
margin-bottom:6px;
}

.info p{
color:#bbb;
}

</style>
</head>

</div>
</div>
